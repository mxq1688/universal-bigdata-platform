apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: bigdata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.49.1
          ports:
            - containerPort: 9090
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: bigdata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.3.1
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin123
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: bigdata
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: bigdata
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bigdata-ingress
  namespace: bigdata
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.bigdata.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    - host: flink.bigdata.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flink-jobmanager
                port:
                  number: 8081
    - host: doris.bigdata.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: doris-fe
                port:
                  number: 8030
