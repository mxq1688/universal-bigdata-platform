global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: "flink"
    static_configs:
      - targets: ["flink-jobmanager:8081"]
    metrics_path: /metrics
  - job_name: "doris-fe"
    static_configs:
      - targets: ["doris-fe:8030"]
    metrics_path: /metrics
  - job_name: "doris-be"
    static_configs:
      - targets: ["doris-be:8040"]
    metrics_path: /metrics
