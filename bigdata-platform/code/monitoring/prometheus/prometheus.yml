# =================================================================
# Prometheus 主配置
# 采集目标: Node / MySQL / Kafka / Doris / Flink / Airflow / Agent
# =================================================================

global:
  scrape_interval: 15s          # 采集间隔
  evaluation_interval: 15s      # 规则评估间隔
  scrape_timeout: 10s

  external_labels:
    cluster: "bigdata-platform"
    env: "production"

# ====================== 告警规则文件 ======================
rule_files:
  - "/etc/prometheus/rules/*.yml"

# ====================== Alertmanager ======================
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ====================== 采集目标 ======================
scrape_configs:

  # ---------- Prometheus 自监控 ----------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "prometheus"

  # ---------- Node Exporter (主机指标) ----------
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "bigdata-node-01"

  # ---------- MySQL ----------
  - job_name: "mysql"
    static_configs:
      - targets: ["mysql-exporter:9104"]
        labels:
          instance: "bigdata-mysql"
    metrics_path: /metrics

  # ---------- Kafka ----------
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels:
          instance: "bigdata-kafka"

  # ---------- Doris FE ----------
  - job_name: "doris-fe"
    metrics_path: /metrics
    static_configs:
      - targets: ["doris-fe:8030"]
        labels:
          instance: "bigdata-doris-fe"
          role: "fe"

  # ---------- Doris BE ----------
  - job_name: "doris-be"
    metrics_path: /metrics
    static_configs:
      - targets: ["doris-be:8040"]
        labels:
          instance: "bigdata-doris-be"
          role: "be"

  # ---------- Flink JobManager ----------
  - job_name: "flink"
    metrics_path: /metrics
    static_configs:
      - targets: ["flink-jobmanager:9249"]
        labels:
          instance: "flink-jobmanager"

  # ---------- Airflow (StatsD Exporter) ----------
  - job_name: "airflow"
    static_configs:
      - targets: ["statsd-exporter:9102"]
        labels:
          instance: "airflow"

  # ---------- Elasticsearch ----------
  - job_name: "elasticsearch"
    static_configs:
      - targets: ["es-exporter:9114"]
        labels:
          instance: "bigdata-elasticsearch"

  # ---------- Redis ----------
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          instance: "bigdata-redis"

  # ---------- Agent Service (自定义指标) ----------
  - job_name: "agent-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["agent-service:8501"]
        labels:
          instance: "bigdata-agent"
    scrape_interval: 30s
