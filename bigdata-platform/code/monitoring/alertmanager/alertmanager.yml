# =================================================================
# Alertmanager 配置
# 告警路由: critical → 即时通知 / warning → 聚合后通知
# =================================================================

global:
  resolve_timeout: 5m

  # SMTP 配置 (邮件告警)
  smtp_from: "bigdata-monitor@company.com"
  smtp_smarthost: "smtp.company.com:587"
  smtp_auth_username: "bigdata-monitor@company.com"
  smtp_auth_password: "your_smtp_password"
  smtp_require_tls: true

# ====================== 告警模板 ======================
templates:
  - "/etc/alertmanager/templates/*.tmpl"

# ====================== 告警路由 ======================
route:
  # 默认接收器
  receiver: "default-webhook"

  # 分组策略: 按 alertname + severity 分组
  group_by: ["alertname", "severity"]
  group_wait: 30s          # 首次告警等待时间 (收集同组告警)
  group_interval: 5m       # 同组新告警间隔
  repeat_interval: 4h      # 重复告警间隔

  routes:
    # Critical 告警 → 立即通知 (企微 + 邮件)
    - match:
        severity: critical
      receiver: "critical-alerts"
      group_wait: 10s
      repeat_interval: 1h
      continue: false

    # Warning 告警 → 聚合后通知 (企微)
    - match:
        severity: warning
      receiver: "warning-alerts"
      group_wait: 1m
      repeat_interval: 4h

    # Data team 告警 → 数据团队
    - match:
        team: data
      receiver: "data-team-alerts"
      group_wait: 30s
      repeat_interval: 2h

    # Infra team 告警 → 基础设施团队
    - match:
        team: infra
      receiver: "infra-team-alerts"
      group_wait: 30s
      repeat_interval: 2h

# ====================== 告警抑制 ======================
inhibit_rules:
  # Critical 触发时抑制同组件的 Warning
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]

  # 节点宕机时抑制该节点上所有告警
  - source_match:
      alertname: NodeDown
    target_match_re:
      alertname: ".+"
    equal: ["instance"]

# ====================== 接收器 ======================
receivers:

  # --- 默认 (Webhook) ---
  - name: "default-webhook"
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL:-http://localhost:5001/webhook}"
        send_resolved: true

  # --- Critical (企微 + 邮件) ---
  - name: "critical-alerts"
    webhook_configs:
      - url: "${WECHAT_WEBHOOK_URL:-http://localhost:5001/webhook}"
        send_resolved: true
    email_configs:
      - to: "bigdata-oncall@company.com"
        send_resolved: true
        headers:
          Subject: '🔴 [CRITICAL] {{ .GroupLabels.alertname }} - 大数据平台'

  # --- Warning (企微) ---
  - name: "warning-alerts"
    webhook_configs:
      - url: "${WECHAT_WEBHOOK_URL:-http://localhost:5001/webhook}"
        send_resolved: true

  # --- 数据团队 ---
  - name: "data-team-alerts"
    webhook_configs:
      - url: "${DATA_TEAM_WEBHOOK:-http://localhost:5001/webhook}"
        send_resolved: true
    email_configs:
      - to: "data-team@company.com"
        send_resolved: true
        headers:
          Subject: '⚠️ [{{ .GroupLabels.severity | toUpper }}] {{ .GroupLabels.alertname }} - 数据平台'

  # --- 基础设施团队 ---
  - name: "infra-team-alerts"
    webhook_configs:
      - url: "${INFRA_TEAM_WEBHOOK:-http://localhost:5001/webhook}"
        send_resolved: true
    email_configs:
      - to: "infra-team@company.com"
        send_resolved: true
        headers:
          Subject: '⚠️ [{{ .GroupLabels.severity | toUpper }}] {{ .GroupLabels.alertname }} - 基础设施'
