# =================================================================
# 大数据平台 监控栈 (Prometheus + Grafana + Alertmanager + Exporters)
#
# 用法:
#   docker-compose -f docker-compose.monitoring.yml up -d
#
# 访问:
#   Grafana:      http://localhost:3000  (admin / bigdata2026)
#   Prometheus:   http://localhost:9090
#   Alertmanager: http://localhost:9093
# =================================================================

version: "3.8"

services:

  # ====================== Prometheus ======================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: bigdata-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - monitoring
      - default

  # ====================== Alertmanager ======================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: bigdata-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped
    networks:
      - monitoring

  # ====================== Grafana ======================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: bigdata-grafana
    env_file:
      - ./monitoring/grafana/grafana.env
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring
      - default

  # ====================== Node Exporter (主机指标) ======================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: bigdata-node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped
    networks:
      - monitoring

  # ====================== MySQL Exporter ======================
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: bigdata-mysql-exporter
    environment:
      DATA_SOURCE_NAME: "root:root123@(bigdata-mysql:3306)/"
    ports:
      - "9104:9104"
    restart: unless-stopped
    networks:
      - monitoring
      - default

  # ====================== Kafka Exporter ======================
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: bigdata-kafka-exporter
    command:
      - "--kafka.server=bigdata-kafka:9092"
      - "--topic.filter=.*"
      - "--group.filter=.*"
    ports:
      - "9308:9308"
    restart: unless-stopped
    networks:
      - monitoring
      - default

  # ====================== Redis Exporter ======================
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: bigdata-redis-exporter
    environment:
      REDIS_ADDR: "bigdata-redis:6379"
    ports:
      - "9121:9121"
    restart: unless-stopped
    networks:
      - monitoring
      - default

  # ====================== Elasticsearch Exporter ======================
  es-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.7.0
    container_name: bigdata-es-exporter
    command:
      - "--es.uri=http://bigdata-elasticsearch:9200"
      - "--es.all"
      - "--es.indices"
    ports:
      - "9114:9114"
    restart: unless-stopped
    networks:
      - monitoring
      - default

  # ====================== StatsD Exporter (Airflow) ======================
  statsd-exporter:
    image: prom/statsd-exporter:v0.26.0
    container_name: bigdata-statsd-exporter
    command:
      - "--statsd.listen-udp=:8125"
      - "--web.listen-address=:9102"
    ports:
      - "9102:9102"
      - "8125:8125/udp"
    restart: unless-stopped
    networks:
      - monitoring
      - default

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
  default:
    external: true
    name: code_default
